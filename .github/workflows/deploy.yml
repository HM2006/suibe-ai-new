name: 自动部署到云服务器

on:
  push:
    branches: [main]
  workflow_dispatch: # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 部署到服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "=== 开始部署 ==="
            
            # 部署路径
            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"
            
            # 如果项目目录不存在，克隆仓库
            if [ ! -d "$DEPLOY_DIR" ]; then
              echo ">>> 首次部署，克隆仓库..."
              mkdir -p "$(dirname "$DEPLOY_DIR")"
              git clone https://github.com/HM2006/suibe-ai-new.git "$DEPLOY_DIR"
            else
              echo ">>> 拉取最新代码..."
              cd "$DEPLOY_DIR"
              git fetch origin
              git reset --hard origin/main
            fi
            
            cd "$DEPLOY_DIR"

            # 生成 .env 文件（从 Secrets 写入，不提交到 Git）
            echo ">>> 生成 .env 文件..."
            cd "$DEPLOY_DIR/xiaomao-server"
            cat > .env << ENVEOF
            HIAGENT_API_BASE=${{ secrets.HIAGENT_API_BASE }}
            HIAGENT_API_KEY=${{ secrets.HIAGENT_API_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            QWEATHER_API_HOST=${{ secrets.QWEATHER_API_HOST }}
            QWEATHER_API_KEY=${{ secrets.QWEATHER_API_KEY }}
            ENVEOF

            # 安装后端依赖
            echo ">>> 安装后端依赖..."
            cd "$DEPLOY_DIR/xiaomao-server"
            npm install --production
            
            # 安装前端依赖并构建
            echo ">>> 构建前端..."
            cd "$DEPLOY_DIR/xiaomao-web"
            npm install
            rm -rf dist
            npm run build
            
            # 复制构建产物到后端静态目录
            echo ">>> 复制前端构建产物..."
            rm -rf "$DEPLOY_DIR/xiaomao-server/public"
            cp -r dist "$DEPLOY_DIR/xiaomao-server/public"
            
            # 使用 PM2 重启后端服务
            echo ">>> 重启服务..."
            cd "$DEPLOY_DIR/xiaomao-server"
            
            # 安装 PM2（如果未安装）
            if ! command -v pm2 &> /dev/null; then
              echo ">>> 安装 PM2..."
              npm install -g pm2
            fi
            
            # 重启或启动服务
            pm2 restart suibe-ai 2>/dev/null || pm2 start server.js --name suibe-ai
            pm2 save
            
            echo "=== 部署完成 ==="
            pm2 status
